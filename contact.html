<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeycomb Cafe - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero" id="contact-hero">
        <div class="hero-overlay" id="contact-hero-overlay">
            
          <nav>
        <img src="Honeycomb logo.png" class="logo">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav> 


            <div class="contact-container">
                <div class="contact-info">
                    <h1>Get in Touch </h1>
                    <p class="contact-sub">Have questions?</p>
                    
                    <div class="info-blocks">
                        <div class="info-item">
                            <h3> Find Us</h3>
                            <p>Airport Junction,Block 8</p>
                        </div>
                        <div class="info-item">
                            <h3> Hours</h3>
                            <p>Mon - Fri: 7:00 AM - 10:00 PM</p>
                            <p>Sat - Sun: 9:00 AM - 8:00 PM</p>
                        </div>
                        <div class="info-item">
                            <h3> Contact</h3>
                            <p>hello@honeycombcafe.com</p>
                            <p>+267 77345902</p>
                        </div>
                    </div>
                </div>
              <div class="contact-form-box">
                    <h2>Send a Message</h2>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" placeholder=" your name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Campus Email</label>
                            <input type="email" id="email" name="email" placeholder="your email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="What's on your mind?..." required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>

            </div> 

        </div>
    </div>
</body>
</html>
