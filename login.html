<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeycomb Cafe - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="hero" id="login-hero">
        <div class="hero-overlay" id = "login-hero-overlay">
    <nav>
        <img src="Honeycomb logo.png" class="logo">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box">

            <div class="login-header">
                <header>Login</header>
            </div>

            <div class="input-box">
                <input type="text" class="input-field" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" class="input-field" placeholder="Password" required>
            </div>

           
            <div class="forgot">
                <section>
                    <input type="checkbox" id="check">
                    <label for="check">Remember me</label>
                </section>
                <section>
                    <a href="#">Forgot password</a>
                </section>
            </div>

            <div class="input-submit">
                <button class="submit-btn">Login</button>
            </div>

            <div class="sign-up-link">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>

        </div>
    </div>

    <div class="social-media" id="home-social-media">
        <p>Hey! Check out our social media platforms</p>
        <ion-icon name="logo-instagram"></ion-icon>
        <ion-icon name="logo-facebook"></ion-icon>
        <ion-icon name="logo-whatsapp"></ion-icon>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
